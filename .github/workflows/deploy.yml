name: Deploy to Netlify

# Auto-deploy the static site to Netlify on every push to main.
# Requires one repo secret: NETLIFY_AUTH_TOKEN (a Netlify personal access token).
# Targets the existing site by name, so no Site ID is needed.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: netlify-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Netlify CLI
        run: npm install -g netlify-cli@17

      - name: Assemble publish folder (site files only)
        run: |
          mkdir -p _site
          cp index.html netlify.toml _site/
          cp -r assets _site/

      - name: Deploy to Netlify (production)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: >-
          netlify deploy --prod
          --dir=_site
          --site=playful-kelpie-13cf7e
          --message="CI deploy ${GITHUB_SHA::7}"
