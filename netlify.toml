# Netlify continuous-deployment config.
# With this in the repo, "Import from Git" needs zero manual settings —
# Netlify publishes the site root on every push. No build step (static site).

[build]
  publish = "."
  command = ""

# Assets aren't fingerprinted (no build step), so cache them but always
# revalidate against the server via ETag. A returning visitor gets a fast 304
# when nothing changed, and picks up new CSS/JS/images immediately after a
# deploy — no stale-file footgun. (Netlify's CDN still serves from the edge.)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Sensible security headers for the whole site.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
