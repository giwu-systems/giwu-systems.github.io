# Netlify continuous-deployment config.
# With this in the repo, "Import from Git" needs zero manual settings —
# Netlify publishes the site root on every push. No build step (static site).

[build]
  publish = "."
  command = ""

# Long-cache the fingerprint-safe static assets (logos, css, js).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Sensible security headers for the whole site.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
